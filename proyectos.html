<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Proyectos</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
}

nav{
background:#002D62;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.proyecto{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
padding:10px 20px;
background:#00b894;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<nav>

<div>

<a href="index.html">Inicio</a>
<a href="proyectos.html">Proyectos</a>
<a href="resultados.html">Resultados</a>

</div>

<div id="usuario"></div>

</nav>

<h1>Proyectos a Votar</h1>

<div class="proyecto">

<h2>Servicio Militar Obligatorio</h2>

<button onclick="votar('militar')">Aprobar</button>

</div>

<div class="proyecto">

<h2>Proyecto Educación Nacional</h2>

<button onclick="votar('educacion')">Aprobar</button>

</div>

<script>

let usuario = localStorage.getItem("provincia");

if(usuario){

document.getElementById("usuario").innerHTML =
usuario + ' | <button onclick="cerrarSesion()">Cerrar sesión</button>';

}else{

alert("Debes iniciar sesión");

location.href="index.html";

}

function cerrarSesion(){

localStorage.removeItem("provincia");

location.href="index.html";

}

function votar(proyecto){

let votos = JSON.parse(localStorage.getItem(proyecto)) || [];

if(votos.includes(usuario)){

alert("Ya votaste este proyecto");

return;

}

votos.push(usuario);

localStorage.setItem(proyecto, JSON.stringify(votos));

alert("Voto registrado");

}

</script>

</body>
</html>
