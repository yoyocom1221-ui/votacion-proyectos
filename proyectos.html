<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Proyectos</title>
<style>
body{font-family:Arial;background:#f2f2f2;text-align:center;}
nav{background:#002D62;padding:15px;display:flex;justify-content:space-between;}
nav a{color:white;margin:10px;text-decoration:none;font-weight:bold;}
.proyecto{background:white;padding:20px;margin:20px;border-radius:10px;}
button{padding:10px 20px;margin:5px;background:#00b894;border:none;color:white;cursor:pointer;border-radius:5px;}
button:disabled{background:gray;cursor:not-allowed;}
</style>
</head>
<body>

<nav>
<div>
<a href="index.html">Inicio</a>
<a href="proyectos.html">Proyectos</a>
<a href="resultados.html">Resultados</a>
</div>
<div id="usuario"></div>
</nav>

<h1>Proyectos a Votar</h1>

<div class="proyecto">
<h2>PAE proyecto de acogida para niños especiales</h2>
<button onclick="verDoc('PAE.docx')">Ver Proyecto</button>
<button id="btn-pae" onclick="votar('pae')">Aprobar</button>
</div>

<div class="proyecto">
<h2>Proyecto de prevención y acogida para niños y niñas indigentes</h2>
<button onclick="verDoc('indigentes.docx')">Ver Proyecto</button>
<button id="btn-indigentes" onclick="votar('indigentes')">Aprobar</button>
</div>

<div class="proyecto">
<h2>Empleo Digno y Primera Inserción Laboral</h2>
<button onclick="verDoc('empleo.docx')">Ver Proyecto</button>
<button id="btn-empleo" onclick="votar('empleo')">Aprobar</button>
</div>

<div class="proyecto">
<h2>Proyecto de Exoneración Estudiantil</h2>
<button onclick="verDoc('exoneracion.docx')">Ver Proyecto</button>
<button id="btn-exoneracion" onclick="votar('exoneracion')">Aprobar</button>
</div>

<div class="proyecto">
<h2>Servicio Militar Obligatorio Para Jóvenes</h2>
<button onclick="verDoc('militar.docx')">Ver Proyecto</button>
<button id="btn-militar" onclick="votar('militar')">Aprobar</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, getDoc, updateDoc, arrayUnion, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGAwKQ8FMESpKcAHzglPXZ2lqJarVmvOc",
  authDomain: "votacion-proyectos.firebaseapp.com",
  projectId: "votacion-proyectos",
  storageBucket: "votacion-proyectos.firebasestorage.app",
  messagingSenderId: "959121228114",
  appId: "1:959121228114:web:f69b6e27abd4a177a17a8b"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuario = localStorage.getItem("provincia");
if(!usuario){ alert("Debes iniciar sesión"); location.href="index.html"; }
else document.getElementById("usuario").innerHTML = usuario + ' | <button onclick="cerrarSesion()">Cerrar sesión</button>';

// FUNCIONES GLOBALES PARA BOTONES
window.cerrarSesion = function() {
  localStorage.removeItem("provincia");
  location.href="index.html";
}

window.verDoc = function(archivo) {
  window.open(archivo);
}

window.votar = async function(proyecto){
  const docRef = doc(db,"votos",proyecto);
  const docSnap = await getDoc(docRef);
  let votos = docSnap.exists() ? docSnap.data().usuarios : [];
  if(votos.includes(usuario)){ alert("Ya votaste este proyecto"); return; }
  await updateDoc(docRef,{usuarios: arrayUnion(usuario)});
  alert("Voto registrado ✅");
}

// BLOQUEAR BOTONES SI YA VOTASTE Y ESCUCHAR CAMBIOS EN TIEMPO REAL
const proyectos = ["pae","indigentes","empleo","exoneracion","militar"];
proyectos.forEach(p=>{
  const docRef = doc(db,"votos",p);
  onSnapshot(docRef,(docSnap)=>{
    let votos = docSnap.exists() ? docSnap.data().usuarios : [];
    const btn = document.getElementById("btn-" + p);
    if(votos.includes(usuario)) btn.disabled = true;
  });
});
</script>

</body>
</html>
