<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Votación de Proyectos</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
overflow:hidden;
}

/* Fondo con imagen */

.fondo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;

background-image:url("https://upload.wikimedia.org/wikipedia/commons/4/4f/Congreso_Nacional_Rep%C3%BAblica_Dominicana.jpg");

background-size:cover;
background-position:center;

filter:blur(6px) brightness(0.4);

z-index:-1;
}

/* Navegación */

nav{
background:#002D62;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
text-decoration:none;
margin:10px;
font-weight:bold;
}

/* contenido */

.inicio{
margin-top:200px;
}

button{
padding:15px 30px;
font-size:18px;
background:#00b894;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="fondo"></div>

<nav>

<div>

<a href="index.html">Inicio</a>
<a href="proyectos.html">Proyectos</a>
<a href="resultados.html">Resultados</a>

</div>

<div id="usuario"></div>

</nav>

<div class="inicio">

<h1>Bienvenidos Distinguidos Senadores</h1>

<button id="loginBtn" onclick="iniciarSesion()">Iniciar sesión</button>

</div>

<script>

let usuario = localStorage.getItem("provincia");
let loginBtn = document.getElementById("loginBtn");

if(usuario){

document.getElementById("usuario").innerHTML =
usuario + ' | <button onclick="cerrarSesion()">Cerrar sesión</button>';

loginBtn.style.display="none";

}

function iniciarSesion(){

let provincia = prompt("Escribe tu provincia");

if(provincia){

localStorage.setItem("provincia",provincia);

location.reload();

}

}

function cerrarSesion(){

localStorage.removeItem("provincia");

location.reload();

}

</script>

</body>
</html>
