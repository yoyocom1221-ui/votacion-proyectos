<style>

body{

font-family:Arial;
background:#111;
color:white;
text-align:center;
}

nav{
background:#002D62;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;

margin:10px;
font-weight:bold;
}

#usuario button{
padding:5px 10px;
cursor:pointer;
}

.inicio{
margin-top:150px;

button{

<body>

<nav>

<div>

<a href="index.html">Inicio</a>
<a href="proyectos.html">Proyectos</a>

</div>

<div id="usuario"></div>

</nav>

<div class="inicio">

<h1>Bienvenidos Distinguidos Senadores</h1>

<button onclick="iniciarSesion()">Iniciar sesión</button>

</div>

<script>

let usuario = localStorage.getItem("provincia");

if(usuario){

document.getElementById("usuario").innerHTML =
usuario + ' | <button onclick="cerrarSesion()">Cerrar sesión</button>';

}

function iniciarSesion(){

let provincia = prompt("Escribe tu provincia");

localStorage.setItem("provincia", provincia);

location.reload();

}

function cerrarSesion(){

localStorage.removeItem("provincia");

location.reload();

}

</script>

</body>
