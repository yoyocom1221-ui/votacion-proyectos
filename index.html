<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<title>Votación de Proyectos</title>

<style>

body{
margin:0;
font-family:Arial;
background:
linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)),
url("https://images.unsplash.com/photo-1529101091764-c3526daf38fe");
background-size:cover;
background-position:center;
height:100vh;
color:white;
text-align:center;
}

nav{
background:#002D62;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

nav a{
color:white;
margin:20px;
text-decoration:none;
font-weight:bold;
}

#userBox{
margin-right:20px;
}

.inicio{
margin-top:200px;
}

h1{
font-size:60px;
}

button{
padding:15px 30px;
font-size:18px;
background:#00b894;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

#formProvincia{
display:none;
margin-top:40px;
}

input{
padding:10px;
font-size:18px;
}

</style>

</head>

<body>

<nav>

<div>
<a href="index.html">Inicio</a>
<a href="proyectos.html">Proyectos</a>
<a href="resultados.html">Resultados</a>
</div>

<div id="userBox"></div>

</nav>

<div class="inicio">

<h1>Bienvenidos Distinguidos Senadores</h1>

<button id="login">Iniciar sesión con Google</button>

<div id="formProvincia">

<h2>Establece tu provincia</h2>

<input type="text" id="provincia" placeholder="Ej: Santo Domingo">

<br><br>

<button id="guardarProvincia">Guardar</button>

</div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import { getFirestore, doc, setDoc, getDoc }

from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {

apiKey: "AIzaSyDGAwKQ8FMESpKcAHzglPXZ2lqJarVmvOc",

authDomain: "votacion-proyectos.firebaseapp.com",

projectId: "votacion-proyectos",

storageBucket: "votacion-proyectos.firebasestorage.app",

messagingSenderId: "959121228114",

appId: "1:959121228114:web:f69b6e27abd4a177a17a8b"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const db = getFirestore(app);

const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("login");

const provinciaForm = document.getElementById("formProvincia");

const provinciaInput = document.getElementById("provincia");

const guardarProvincia = document.getElementById("guardarProvincia");

const userBox = document.getElementById("userBox");

loginBtn.onclick = async ()=>{

await signInWithPopup(auth,provider);

}

onAuthStateChanged(auth, async (user)=>{

if(user){

loginBtn.style.display="none";

const ref = doc(db,"usuarios",user.uid);

const snap = await getDoc(ref);

if(snap.exists()){

const provincia = snap.data().provincia;

userBox.innerHTML = provincia + " | <button id='logout'>Salir</button>";

document.getElementById("logout").onclick=()=>signOut(auth);

}else{

provinciaForm.style.display="block";

}

}else{

loginBtn.style.display="block";

userBox.innerHTML="";

}

});

guardarProvincia.onclick = async ()=>{

const user = auth.currentUser;

const provincia = provinciaInput.value;

await setDoc(doc(db,"usuarios",user.uid),{

provincia: provincia

});

location.reload();

}

</script>

</body>

</html>
