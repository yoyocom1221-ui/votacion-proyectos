<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Votación de Proyectos</title>

<style>

body{
margin:0;
font-family:Arial;
color:white;
text-align:center;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background-image:url("https://images.unsplash.com/photo-1529107386315-e1a2ed48a620");
background-size:cover;
background-position:center;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
z-index:-1;
}

h1{
font-size:50px;
margin-bottom:40px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:10px;
cursor:pointer;
background:#4285F4;
color:white;
}

button:hover{
background:#3367D6;
}

</style>

</head>
<body>

<h1>Bienvenidos Distinguidos Senadores</h1>

<button onclick="login()">Iniciar sesión con Google</button>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGAwKQ8FMESpKcAHzglPXZ2lqJarVmvOc",
  authDomain: "votacion-proyectos.firebaseapp.com",
  projectId: "votacion-proyectos",
  storageBucket: "votacion-proyectos.firebasestorage.app",
  messagingSenderId: "959121228114",
  appId: "1:959121228114:web:f69b6e27abd4a177a17a8b",
  measurementId: "G-CLNSBGLSR2"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();

window.login = function(){

signInWithPopup(auth, provider)
.then((result)=>{

const user = result.user;

alert("Bienvenido " + user.displayName);

window.location.href="proyectos.html";

})
.catch((error)=>{

console.error("Error de inicio:", error);
alert("Error al iniciar sesión");

});

}

</script>

</body>
</html>
