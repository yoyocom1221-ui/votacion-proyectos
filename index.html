<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <title>Votación de Proyectos</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                  url("https://images.unsplash.com/photo-1529101091764-c3526daf38fe");
      background-size: cover;
      background-position: center;
      height: 100vh;
      color: white;
      text-align: center;
    }

    nav {
      background: #002D62;
      padding: 15px;
    }

    nav a {
      color: white;
      margin: 20px;
      text-decoration: none;
      font-weight: bold;
    }

    .inicio {
      margin-top: 200px;
    }

    h1 {
      font-size: 60px;
    }

    button {
      padding: 15px 30px;
      font-size: 18px;
      background: #00b894;
      border: none;
      color: white;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background: #009e7a;
    }

    #usernameForm {
      display: none;
      margin-top: 50px;
    }

    input[type="text"] {
      padding: 10px;
      font-size: 18px;
      border-radius: 5px;
      border: none;
      margin: 10px;
    }

    input[type="submit"] {
      padding: 10px 20px;
      font-size: 18px;
      background: #4285F4;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background: #3367D6;
    }
  </style>
</head>

<body>
  <nav>
    <a href="index.html">Inicio</a>
    <a href="proyectos.html">Proyectos</a>
    <a href="resultados.html">Resultados</a>
  </nav>

  <div class="inicio">
    <h1>Bienvenidos Distinguidos Senadores</h1>
    <button id="login">Iniciar sesión con Google</button>

    <div id="usernameForm">
      <h2>Establece tu nombre de usuario (provincia)</h2>
      <input type="text" id="username" placeholder="Escribe tu provincia" />
      <br>
      <input type="submit" id="submitUsername" value="Guardar" />
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDGAwKQ8FMESpKcAHzglPXZ2lqJarVmvOc",
      authDomain: "votacion-proyectos.firebaseapp.com",
      projectId: "votacion-proyectos",
      storageBucket: "votacion-proyectos.appspot.com",
      messagingSenderId: "959121228114",
      appId: "1:959121228114:web:f69b6e27abd4a177a17a8b"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // Referencias a elementos del DOM
    const loginBtn = document.getElementById("login");
    const usernameForm = document.getElementById("usernameForm");
    const usernameInput = document.getElementById("username");
    const submitUsernameBtn = document.getElementById("submitUsername");

    // Escuchar el clic en el botón de login
    loginBtn.addEventListener("click", async () => {
      try {
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        alert("Bienvenido " + user.displayName);
        // Una vez que se inicia sesión, ocultamos el botón y mostramos el formulario
        loginBtn.style.display = "none";
        usernameForm.style.display = "block";
      } catch (error) {
        console.error("Error al iniciar sesión:", error);
        alert("Error al iniciar sesión");
      }
    });

    // Escuchar cambios de estado (para recargar si ya hay un usuario logueado)
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Si ya hay un usuario logueado, ocultamos el botón y mostramos el formulario
        loginBtn.style.display = "none";
        usernameForm.style.display = "block";
      }
    });

    // Escuchar clic en el botón de guardar el nombre de usuario
    submitUsernameBtn.addEventListener("click", async () => {
      const user = auth.currentUser;
      const username = usernameInput.value.trim();

      if (user && username) {
        try {
          // Guardar el nombre de usuario en Firestore
          await setDoc(doc(db, "usuarios", user.uid), {
            nombre: user.displayName,
            provincia: username
          });
          alert("Nombre de usuario (provincia) guardado. Ahora puedes votar.");
          // Opcional: redirigir a la página de proyectos
          window.location.href = "proyectos.html";
        } catch (error) {
          console.error("Error guardando nombre de usuario:", error);
          alert("Error al guardar el nombre de usuario");
        }
      } else {
        alert("Por favor, ingresa una provincia válida.");
      }
    });
  </script>
</body>

</html>
