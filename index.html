<div class="inicio">

<h1>Bienvenidos Distinguidos Senadores</h1>

<button id="login">
Iniciar sesión con Google
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import { getAuth, GoogleAuthProvider, signInWithPopup }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDGAwKQ8FMESpKcAHzglPXZ2lqJarVmvOc",
  authDomain: "votacion-proyectos.firebaseapp.com",
  projectId: "votacion-proyectos",
  storageBucket: "votacion-proyectos.firebasestorage.app",
  messagingSenderId: "959121228114",
  appId: "1:959121228114:web:f69b6e27abd4a177a17a8b"
};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

const loginBtn = document.getElementById("login");

loginBtn.addEventListener("click", async () => {

try {

const result = await signInWithPopup(auth, provider);

const user = result.user;

alert("Bienvenido " + user.displayName);

} catch(error){

console.error(error);

alert("Error al iniciar sesión");

}

});

</script>
