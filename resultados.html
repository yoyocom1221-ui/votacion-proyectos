<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Resultados</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

nav{
background:#002D62;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.resultado{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

button{
padding:10px 20px;
background:red;
border:none;
color:white;
cursor:pointer;
border-radius:5px;
}

</style>

</head>

<body>

<nav>

<div>

<a href="index.html">Inicio</a>
<a href="proyectos.html">Proyectos</a>
<a href="resultados.html">Resultados</a>

</div>

<div id="usuario"></div>

</nav>

<h1>Resultados de Votación</h1>

<div class="resultado">

<h2>PAE proyecto de acogida para niños especiales</h2>
<p id="pae"></p>

</div>

<div class="resultado">

<h2>Proyecto de prevención y acogida para niños y niñas indigentes</h2>
<p id="indigentes"></p>

</div>

<div class="resultado">

<h2>Empleo Digno y Primera Inserción Laboral</h2>
<p id="empleo"></p>

</div>

<div class="resultado">

<h2>Proyecto de Exoneración Estudiantil</h2>
<p id="exoneracion"></p>

</div>

<div class="resultado">

<h2>Servicio Militar Obligatorio Para Jóvenes</h2>
<p id="militar"></p>

</div>

<br>

<button onclick="borrarVotos()">Eliminar votos</button>

<script>

let usuario = localStorage.getItem("provincia");

if(usuario){

document.getElementById("usuario").innerHTML =
usuario + ' | <button onclick="cerrarSesion()">Cerrar sesión</button>';

}

function cerrarSesion(){

localStorage.removeItem("provincia");

location.href="index.html";

}

function mostrarResultados(){

let proyectos = ["pae","indigentes","empleo","exoneracion","militar"];

proyectos.forEach(p=>{

let votos = JSON.parse(localStorage.getItem(p)) || [];

document.getElementById(p).innerHTML =
"Votos: " + votos.length + "<br>" + votos.join("<br>");

});

}

function borrarVotos(){

localStorage.removeItem("pae");
localStorage.removeItem("indigentes");
localStorage.removeItem("empleo");
localStorage.removeItem("exoneracion");
localStorage.removeItem("militar");

alert("Votos eliminados");

location.reload();

}

mostrarResultados();

</script>

</body>
</html>
