<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Resultados</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f2f2f2;
}

nav{
background:#002D62;
padding:15px;
display:flex;
justify-content:space-between;
}

nav a{
color:white;
margin:10px;
text-decoration:none;
font-weight:bold;
}

.resultado{
background:white;
padding:20px;
margin:20px;
border-radius:10px;
}

</style>

</head>

<body>

<nav>

<div>

<a href="index.html">Inicio</a>
<a href="proyectos.html">Proyectos</a>
<a href="resultados.html">Resultados</a>

</div>

<div id="usuario"></div>

</nav>

<h1>Resultados de Votación</h1>

<div class="resultado">

<h2>Servicio Militar Obligatorio</h2>

<p id="militar"></p>

</div>

<div class="resultado">

<h2>Proyecto Educación Nacional</h2>

<p id="educacion"></p>

</div>

<script>

let usuario = localStorage.getItem("provincia");

if(usuario){

document.getElementById("usuario").innerHTML =
usuario + ' | <button onclick="cerrarSesion()">Cerrar sesión</button>';

}

function cerrarSesion(){

localStorage.removeItem("provincia");

location.href="index.html";

}

let militar = JSON.parse(localStorage.getItem("militar")) || [];

let educacion = JSON.parse(localStorage.getItem("educacion")) || [];

document.getElementById("militar").innerHTML =
"Votos: " + militar.length + "<br>" + militar.join("<br>");

document.getElementById("educacion").innerHTML =
"Votos: " + educacion.length + "<br>" + educacion.join("<br>");

</script>

</body>
</html>
